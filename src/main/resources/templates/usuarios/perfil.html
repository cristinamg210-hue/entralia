<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi perfil</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f2c7f5, #341977);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .perfil-card {
            width: 420px;
            background: white;
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #C8A2FF;
            margin-bottom: 15px;
        }

        .perfil-card h3 {
            font-weight: 700;
            color: #6A4FBF;
        }
    </style>
</head>

<body>

<th:block th:replace="fragments/header :: header"></th:block>

<div class="perfil-card">

    <img src="/img/avatar-default.png" class="avatar">

    <h3 th:text="${usuario.nombre}"></h3>

    <div class="perfil-info mt-3">
        <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
    </div>

    <hr class="my-4">

    <a href="/compras/mis-compras" class="btn btn-primary w-100 mb-2">Mis compras</a>
    <a href="/" class="btn btn-outline-secondary w-100 mb-2">Volver al inicio</a>
    <a href="/logout" class="btn btn-outline-danger w-100">Cerrar sesión</a>

</div>

</body>
</html>
