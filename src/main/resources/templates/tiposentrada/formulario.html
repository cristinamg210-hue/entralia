<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Tipo de Entrada</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-4">

<h2 th:text="${tipoentrada.idTipoEntrada == null} ? 'Nuevo Tipo de Entrada' : 'Editar Tipo de Entrada'"></h2>

<form th:action="@{${tipoentrada.idTipoEntrada == null} ? '/tiposentrada/guardar' : '/tiposentrada/actualizar'}"
      th:object="${tipoentrada}" method="post">

    <input type="hidden" th:field="*{idTipoEntrada}"/>

    <!-- EVENTO -->
    <div class="mb-3">
        <label class="form-label">Evento</label>
        <select th:field="*{idEvento}" class="form-select" required>
            <option value="">Seleccione un evento</option>
            <option th:each="e : ${eventos}"
                    th:value="${e.idEvento}"
                    th:text="${e.nombre}">
            </option>
        </select>
    </div>

    <!-- NOMBRE -->
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{nombre}" class="form-control" required>
    </div>

    <!-- PRECIO -->
    <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
    </div>

    <!-- STOCK  -->
    <div class="mb-3">
        <label class="form-label">Stock</label>
        <input type="number" min="0" th:field="*{stock}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="/tiposentrada" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
