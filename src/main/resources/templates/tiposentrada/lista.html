<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tipos de Entrada</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-4">

<h2>Tipos de Entrada</h2>

<a href="/tiposentrada/nuevo" class="btn btn-primary mb-3">Nuevo Tipo de Entrada</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Evento</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="t : ${tiposentrada}">
            <td th:text="${t.idTipoEntrada}"></td>
            <td th:text="${t.idEvento}"></td>
            <td th:text="${t.nombre}"></td>
            <td th:text="${t.precio}"></td>
            <td>
                <a th:href="@{'/tiposentrada/editar/' + ${t.idTipoEntrada}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/tiposentrada/eliminar/' + ${t.idTipoEntrada}}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
