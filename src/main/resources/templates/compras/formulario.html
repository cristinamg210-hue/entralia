<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Compra de Entradas</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS pastel personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="container mt-4">

    <div class="card shadow-sm p-4 compra-card">

        <h2 class="text-center mb-4">Realizar Compra</h2>

        <!-- FORMULARIO PRINCIPAL -->
        <form th:action="@{/compras/guardar}" th:object="${compra}" method="post">

            <!-- ID DEL EVENTO (OCULTO) -->
            <input type="hidden" name="idEvento" th:value="${idEvento}"/>

            <h4 class="mb-3">Detalles de la compra</h4>

            <!-- MENSAJE SI NO QUEDA NINGÚN TIPO DE ENTRADA CON STOCK -->
            <div id="mensajeSinStock" class="alert alert-danger fw-bold" style="display:none;">
                No quedan entradas disponibles para este evento.
            </div>

            <!-- BLOQUES DE DETALLES -->
            <div th:each="detalle, iter : *{detalles}" class="detalle-bloque mb-4 p-3">

                <!-- SELECT DEL TIPO DE ENTRADA -->
                <div class="mb-3">
                    <label class="form-label">Tipo de entrada</label>

                    <select class="form-control"
                            th:field="*{detalles[__${iter.index}__].id_tipo_entrada}"
                            th:id="'tipoEntrada_' + ${iter.index}"
                            th:onchange="'actualizarLinea(' + ${iter.index} + ')'"
                            required>

                        <!-- OPCIONES DEL SELECT -->
                        <option th:each="t : ${tiposEntrada}"
                                th:value="${t.id_tipo_entrada}"
                                th:text="${t.stock == 0 ? t.nombre + ' (AGOTADAS)' 
                                                       : t.nombre + ' - ' + t.precio + '€ (Stock: ' + t.stock + ')'}"
                                th:data-precio="${t.precio}"
                                th:data-stock="${t.stock}"
                                th:disabled="${t.stock == 0}">
                        </option>

                    </select>

                    <!-- AVISO DE POCAS ENTRADAS -->
                    <div th:id="'avisoPocas_' + ${iter.index}" 
                         class="text-warning fw-bold mt-1" 
                         style="display:none;">
                        ⚠ Quedan pocas entradas
                    </div>

                    <!-- ID DEL EVENTO PARA EL DETALLE -->
                    <input type="hidden"
                    th:name="'detalles[' + ${iter.index} + '].id_evento'"
                    th:value="${idEvento}" />



                </div>

                <!-- CANTIDAD -->
                <div class="mb-3">
                    <label class="form-label">Cantidad</label>

                    <input type="number"
                           class="form-control"
                           min="1"
                           th:field="*{detalles[__${iter.index}__].cantidad}"
                           th:id="'cantidad_' + ${iter.index}"
                           th:oninput="'actualizarLinea(' + ${iter.index} + ')'"
                           required>
                </div>

                <!-- PRECIO UNITARIO -->
                <div class="mb-3">
                    <label class="form-label">Precio unitario (€)</label>
                    <input type="text"
                           class="form-control"
                           th:id="'precioUnitario_' + ${iter.index}"
                           value="0.00"
                           readonly>

                    <input type="hidden"
                           th:field="*{detalles[__${iter.index}__].precio_unitario}"
                           th:id="'precioUnitarioHidden_' + ${iter.index}">
                </div>

                <!-- TOTAL -->
                <div class="mb-3">
                    <label class="form-label">Total (€)</label>
                    <input type="text"
                           class="form-control"
                           th:id="'total_' + ${iter.index}"
                           value="0.00"
                           readonly>

                    <input type="hidden"
                           th:field="*{detalles[__${iter.index}__].precioTotal}"
                           th:id="'totalHidden_' + ${iter.index}">
                </div>

                <!-- BOTÓN ELIMINAR -->
                <button type="submit"
                        formaction="/compras/eliminar-detalle"
                        formmethod="post"
                        name="index"
                        th:value="${iter.index}"
                        class="btn btn-danger btn-sm mt-2">
                    Eliminar línea
                </button>

            </div>

            <!-- BOTÓN AÑADIR LÍNEA -->
            <button type="submit"
                    id="btnAgregarLinea"
                    formaction="/compras/agregar-detalle"
                    formmethod="post"
                    class="btn btn-secondary mb-3">
                Añadir otra entrada
            </button>

            <hr>

            <!-- RESUMEN -->
            <div class="card p-3 mb-4" id="resumenCompra" style="display:none;">
                <h4 class="mb-3">Resumen de la compra</h4>

                <div id="resumenLineas"></div>

                <hr>

                <h5 class="text-end">
                    Total general: <span id="totalGeneral" class="fw-bold">0.00 €</span>
                </h5>
            </div>

            <!-- BOTONES FINALES -->
            <div class="d-flex justify-content-between">

                <a href="/" class="btn btn-outline-secondary btn-lg px-4">
                    ⬅ Volver al inicio
                </a>

                <button type="submit" id="btnFinalizar" class="btn btn-success btn-lg px-5" disabled
                        style="opacity:0.5; cursor:not-allowed;">
                    Finalizar Compra
                </button>

            </div>

        </form>
    </div>

</div>

<!-- SCRIPT PRINCIPAL -->
<script>

    /* ============================================================
       ACTUALIZAR LÍNEA
    ============================================================ */
    function actualizarLinea(index) {
        const select = document.getElementById("tipoEntrada_" + index);
        const cantidadInput = document.getElementById("cantidad_" + index);
        const precioUnitarioInput = document.getElementById("precioUnitario_" + index);
        const totalInput = document.getElementById("total_" + index);

        const precioUnitarioHidden = document.getElementById("precioUnitarioHidden_" + index);
        const totalHidden = document.getElementById("totalHidden_" + index);

        const option = select.selectedOptions[0];
        const precio = parseFloat(option.dataset.precio);
        const stock = parseInt(option.dataset.stock);

        // DESACTIVAR cantidad si no hay stock
        cantidadInput.max = stock;
        cantidadInput.disabled = (stock === 0);

        if (stock === 0) {
            cantidadInput.value = 0;
        }

        const cantidad = parseInt(cantidadInput.value) || 0;
        const total = precio * cantidad;

        precioUnitarioInput.value = precio.toFixed(2);
        totalInput.value = total.toFixed(2);

        precioUnitarioHidden.value = precio.toFixed(2);
        totalHidden.value = total.toFixed(2);

        // Aviso de pocas entradas
        const aviso = document.getElementById("avisoPocas_" + index);
        aviso.style.display = (stock > 0 && stock < 10) ? "block" : "none";

        actualizarResumen();
    }

    /* ============================================================
       ACTUALIZAR RESUMEN
    ============================================================ */
    function actualizarResumen() {
        const resumen = document.getElementById("resumenCompra");
        const contenedor = document.getElementById("resumenLineas");
        const totalGeneralSpan = document.getElementById("totalGeneral");
        const btnFinalizar = document.getElementById("btnFinalizar");

        contenedor.innerHTML = "";
        let totalGeneral = 0;
        let hayLineasValidas = false;

        document.querySelectorAll("[id^='tipoEntrada_']").forEach((select, index) => {
            const option = select.selectedOptions[0];
            const nombre = option.textContent;
            const precio = parseFloat(option.dataset.precio);
            const cantidad = parseInt(document.getElementById("cantidad_" + index)?.value) || 0;
            const stock = parseInt(option.dataset.stock);

            const total = precio * cantidad;

            if (stock > 0 && cantidad > 0) {
                hayLineasValidas = true;

                contenedor.innerHTML += `
                    <div class="d-flex justify-content-between mb-2">
                        <span>${nombre} x ${cantidad}</span>
                        <span>${total.toFixed(2)} €</span>
                    </div>
                `;
            }

            totalGeneral += total;
        });

        totalGeneralSpan.textContent = totalGeneral.toFixed(2) + " €";
        resumen.style.display = hayLineasValidas ? "block" : "none";

        // Activar/desactivar botón Finalizar
        if (hayLineasValidas) {
            btnFinalizar.disabled = false;
            btnFinalizar.style.opacity = "1";
            btnFinalizar.style.cursor = "pointer";
        } else {
            btnFinalizar.disabled = true;
            btnFinalizar.style.opacity = "0.5";
            btnFinalizar.style.cursor = "not-allowed";
        }

        comprobarStockGlobal();
    }

    /* ============================================================
       COMPROBAR STOCK GLOBAL
    ============================================================ */
    function comprobarStockGlobal() {
        const selects = document.querySelectorAll("[id^='tipoEntrada_']");
        const btnAgregar = document.getElementById("btnAgregarLinea");
        const btnFinalizar = document.getElementById("btnFinalizar");
        const mensajeSinStock = document.getElementById("mensajeSinStock");

        let hayStock = false;

        // Revisar TODAS las opciones de TODOS los selects
        selects.forEach(select => {
            Array.from(select.options).forEach(opt => {
                const stock = parseInt(opt.dataset.stock);
                if (stock > 0) {
                    hayStock = true;
                }
            });
        });

        if (!hayStock) {
            btnAgregar.disabled = true;
            btnAgregar.style.opacity = "0.5";
            btnAgregar.style.cursor = "not-allowed";

            btnFinalizar.disabled = true;
            btnFinalizar.style.opacity = "0.5";
            btnFinalizar.style.cursor = "not-allowed";

            mensajeSinStock.style.display = "block";
        } else {
            btnAgregar.disabled = false;
            btnAgregar.style.opacity = "1";
            btnAgregar.style.cursor = "pointer";

            mensajeSinStock.style.display = "none";
        }
    }

    /* ============================================================
       INICIALIZACIÓN
    ============================================================ */
    window.onload = function() {
        document.querySelectorAll("[id^='tipoEntrada_']").forEach((select, index) => {
            actualizarLinea(index);
        });

        comprobarStockGlobal();
    };
</script>

</body>
</html>
