<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Compra realizada</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="container mt-5">

<div class="alert alert-success text-center">
    <h2>¡Compra realizada con éxito!</h2>
    <p>Gracias por tu compra. Aquí tienes el resumen.</p>
</div>

<!-- Tarjeta principal -->

<div class="card shadow-sm">

    <div class="card-header bg-primary text-white">
        <strong>Resumen de la compra</strong>
    </div>

    <div class="card-body">

        <h5 class="mb-3">Detalles</h5>

        <!-- Tabla de detalles -->

        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Imagen</th>
                <th>Evento</th>
                <th>Tipo de entrada</th>
                <th>Cantidad</th>
                <th>Precio unitario (€)</th>
                <th>Total (€)</th>
                <th>Asiento</th> 
            </tr>
            </thead>

            <tbody>

                <!-- Recorremos cada detalle -->

            <tr th:each="d : ${compra.detalles}">

                <!-- Imagen del evento -->
                <td>
                    <img th:src="@{'/img/eventos/' + ${d.id_evento} + '.jpg'}"
                         width="120" class="img-thumbnail">
                </td>

                <!-- Nombre del evento (en tu BD solo tienes el ID, por eso lo muestras así) -->

                <td th:text="'Evento ' + ${d.id_evento}"></td>

                <!-- Tipo de entrada (protegido por si viene null) -->
                <td th:text="${d.tipoEntrada != null ? d.tipoEntrada.nombre : 'Tipo no disponible'}"></td>

                <td th:text="${d.cantidad}"></td>
                <td th:text="${d.precio_unitario}"></td>
                <td th:text="${d.precioTotal}"></td>

                <!-- ASIENTO (solo si existe) -->
                <td th:if="${d.asiento != null}" th:text="${d.asiento}"></td>
                <td th:if="${d.asiento == null}">—</td>
            </tr>
            </tbody>
        </table>

        <h4 class="text-end mt-4">
            Total pagado:
            <strong th:text="${#numbers.formatDecimal(compra.totalCompra, 1, 2)}"></strong> €
        </h4>

    </div>
</div>

<!-- Botones de navegación -->
 
<div class="mt-4 text-center">
    <a href="/eventos" class="btn btn-secondary">Volver a eventos</a>
    <a href="/compras/mis-compras" class="btn btn-primary">Ver mis compras</a>
</div>

</body>
</html>
