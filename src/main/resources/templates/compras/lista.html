<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Compras</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-4">

<h2>Compras</h2>

<a href="/compras/nuevo" class="btn btn-primary mb-3">Nueva Compra</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID Compra</th>
            <th>ID Usuario</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="c : ${compras}">
            <td th:text="${c.idCompra}"></td>
            <td th:text="${c.idUsuario}"></td>
            <td>
                <a th:href="@{'/compras/editar/' + ${c.idCompra}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/compras/eliminar/' + ${c.idCompra}}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
