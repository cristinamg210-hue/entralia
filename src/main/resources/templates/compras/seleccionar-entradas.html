<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Entradas</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="container mt-4">

<h2 th:text="${evento.nombre}"></h2>

<!-- MENSAJE DE ERROR SI NO HAY STOCK -->
<p th:if="${error}" class="alert alert-danger fw-bold" th:text="${error}"></p>

<form th:action="@{/compras/comprar}" method="post" class="mt-3">

    <!-- ID del evento -->
    <input type="hidden" name="id_evento" th:value="${evento.id_evento}">

    <!-- TIPO DE ENTRADA -->
    <div class="mb-3">
        <label class="form-label">Tipo de entrada</label>
        <select name="id_tipo_entrada" class="form-select" required>
            <option value="">Seleccione un tipo</option>

            <option th:each="t : ${tiposEntrada}"
                    th:value="${t.id_tipo_entrada}"
                    th:text="${t.nombre + ' - ' + t.precio + '€ (Stock: ' + t.stock + ')'}">
            </option>
        </select>
    </div>

    <!-- CANTIDAD -->
    <div class="mb-3">
        <label class="form-label">Cantidad</label>
        <input type="number" name="cantidad" min="1" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Comprar</button>
    <a href="/eventos" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
