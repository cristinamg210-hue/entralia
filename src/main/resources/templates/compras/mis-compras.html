<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis compras</title>

    <!-- Bootstrap para estilos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<!-- Header común reutilizable -->
<th:block th:replace="fragments/header :: header"></th:block>

<h2 class="text-center mb-4">Mis compras</h2>

<!-- Mensaje si el usuario aún no ha comprado nada -->
<div th:if="${compras.size() == 0}" class="alert alert-info text-center">
    Todavía no has realizado ninguna compra.
</div>

<!-- Lista de compras -->
<div class="row g-4" th:each="compra : ${compras}">

    <div class="col-12">
        <div class="card shadow-sm">

            <!-- Cabecera de la tarjeta -->
            <div class="card-header" style="background:#cbc3d4; color:#000000;">

                <strong>Compra Nº </strong>
                <span th:text="${compra.id_compra}"></span>

                <!-- Fecha de la compra -->
                <span class="float-end">
                    Fecha: <span th:text="${compra.fecha_compra}"></span>
                </span>
            </div>

            <div class="card-body">

                <!-- Tabla con los detalles de la compra -->
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Evento</th>
                            <th>Tipo de entrada</th>
                            <th>Cantidad</th>
                            <th>Precio unitario (€)</th>
                            <th>Total (€)</th>
                            <th>Asiento</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- Recorremos cada detalle de la compra -->
                        <tr th:each="d : ${compra.detalles}">

                            <!-- Nombre del evento -->
                            <td th:text="${d.evento.nombre}"></td>

                            <!-- Tipo de entrada -->
                            <td th:text="${d.tipoEntrada.nombre}"></td>

                            <!-- Cantidad -->
                            <td th:text="${d.cantidad}"></td>

                            <!-- Precio unitario -->
                            <td th:text="${d.precio_unitario}"></td>

                            <!-- Total por línea -->
                            <td th:text="${d.cantidad * d.precio_unitario}"></td>

                            <!-- Asiento (si no hay, muestra guion) -->
                            <td th:text="${d.asiento != null ? d.asiento : '—'}"></td>
                        </tr>
                    </tbody>
                </table>

                <!-- Total de la compra -->
                <h5 class="text-end mt-3">
                    Total compra:
                    <strong th:text="${compra.total}"></strong> €
                </h5>

            </div>
        </div>
    </div>

</div>

<!-- Botón para volver a eventos -->
<div class="text-center mt-4">
    <a href="/eventos" class="btn btn-primary">Volver a eventos</a>
</div>

</body>
</html>
