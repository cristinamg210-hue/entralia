<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Evento</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="container mt-4">

<h2 th:text="${evento.id_evento == 0} ? 'Nuevo Evento' : 'Editar Evento'"></h2>

<!-- IMPORTANTE: enctype="multipart/form-data" -->
<form th:action="@{${evento.id_evento == 0} ? '/eventos/guardar' : '/eventos/actualizar'}"
      th:object="${evento}" method="post" enctype="multipart/form-data">

    <input type="hidden" th:field="*{id_evento}"/>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{nombre}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Aforo Total</label>
        <input type="number" th:field="*{aforo_total}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Sitio</label>
        <input type="text" th:field="*{sitio}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" th:field="*{fecha}" class="form-control" required>
    </div>

    <!-- CAMBIO IMPORTANTE: input file -->
    <div class="mb-3">
        <label class="form-label">Imagen del evento</label>
        <input type="file" name="imagenFile" class="form-control" accept="image/*">
    </div>

    <!-- Mostrar imagen actual si existe -->
    <div class="mb-3" th:if="${evento.imagen}">
        <p>Imagen actual:</p>
        <img th:src="@{'/img/eventos/' + ${evento.imagen}}" width="200">
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea th:field="*{descripcion}" class="form-control"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="/eventos" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
