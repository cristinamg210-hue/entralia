<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${evento.nombre}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<th:block th:replace="fragments/header :: header"></th:block>

<!-- Imagen del evento -->
<div class="text-center mb-4">
    <img th:src="@{'/img/eventos/' + ${evento.imagen}}" 
         alt="Imagen del evento"
         class="img-fluid rounded shadow"
         style="max-height: 350px; object-fit: cover;">
</div>

<h2 th:text="${evento.nombre}"></h2>

<p><strong>Sitio:</strong> <span th:text="${evento.sitio}"></span></p>
<p><strong>Aforo:</strong> <span th:text="${evento.aforo_total}"></span></p>
<p><strong>Fecha:</strong> <span th:text="${evento.fecha}"></span></p>

<!-- STOCK TOTAL -->
<p><strong>Entradas disponibles:</strong>
    <span th:text="${stockTotal}"></span>
</p>

<!-- MENSAJE SI NO HAY STOCK -->
<div th:if="${stockTotal == 0}" class="alert alert-danger fw-bold">
    Entradas agotadas
</div>

<!-- FORMULARIO DE COMPRA -->
<form th:action="@{'/compras/nuevo/' + ${evento.id_evento}}" method="get" class="mt-4">

    <label class="form-label">Tipo de entrada:</label>
    <select name="id_tipo_entrada" class="form-select mb-3"
            th:disabled="${stockTotal == 0}">
        <option th:each="t : ${tiposEntrada}"
                th:value="${t.id_tipo_entrada}"
                th:text="${t.nombre + ' - ' + t.precio + '€ (Stock: ' + t.stock + ')'}"
                th:disabled="${t.stock == 0}">
        </option>
    </select>

    <label class="form-label">Cantidad:</label>
    <input type="number" name="cantidad" min="1" value="1"
           class="form-control mb-3"
           th:disabled="${stockTotal == 0}"/>

    <button type="submit"
            class="btn btn-success"
            th:disabled="${stockTotal == 0}">
        Comprar
    </button>
</form>

</body>
</html>
