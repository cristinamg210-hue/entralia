<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles de Compra</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-4">

<h2>Detalles de Compra</h2>

<a href="/detalles-compra/nuevo" class="btn btn-primary mb-3">Nuevo Detalle</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID Detalle</th>
            <th>ID Compra</th>
            <th>ID Tipo Entrada</th>
            <th>Cantidad</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="d : ${detalles}">
            <td th:text="${d.idDetalle}"></td>
            <td th:text="${d.idCompra}"></td>
            <td th:text="${d.idTipoEntrada}"></td>
            <td th:text="${d.cantidad}"></td>
            <td>
                <a th:href="@{'/detalles-compra/editar/' + ${d.idDetalle}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/detalles-compra/eliminar/' + ${d.idDetalle}}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
