<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Detalle de Compra</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-4">

<h2 th:text="${detalle.idDetalle == null} ? 'Nuevo Detalle de Compra' : 'Editar Detalle de Compra'"></h2>

<form th:action="@{${detalle.idDetalle == null} ? '/detalles-compra/guardar' : '/detalles-compra/actualizar'}"
      th:object="${detalle}" method="post">

    <input type="hidden" th:field="*{idDetalle}"/>

    <div class="mb-3">
        <label class="form-label">ID Compra</label>
        <select th:field="*{idCompra}" class="form-select" required>
            <option value="">Seleccione una compra</option>
            <option th:each="c : ${compras}"
                    th:value="${c.idCompra}"
                    th:text="'Compra #' + ${c.idCompra}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">ID Tipo Entrada</label>
        <select th:field="*{idTipoEntrada}" class="form-select" required>
            <option value="">Seleccione un tipo</option>
            <option th:each="t : ${tiposentrada}"
                    th:value="${t.idTipoEntrada}"
                    th:text="${t.nombre}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Cantidad</label>
        <input type="number" th:field="*{cantidad}" class="form-control" min="1" required>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="/detalles-compra" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
